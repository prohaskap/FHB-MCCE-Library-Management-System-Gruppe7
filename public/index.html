<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Management System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a3a5c; color: white; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.4rem; }
    header a { color: #90caf9; font-size: 0.85rem; margin-left: auto; }
    nav { display: flex; gap: 0; background: #24527a; overflow-x: auto; }
    nav button { background: none; border: none; color: #cce; padding: 0.75rem 1.25rem; cursor: pointer; font-size: 0.9rem; white-space: nowrap; border-bottom: 3px solid transparent; }
    nav button.active { color: white; border-bottom-color: #90caf9; }
    nav button:hover { background: rgba(255,255,255,0.08); }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #1a3a5c; }
    h3 { font-size: 0.95rem; margin-bottom: 0.75rem; color: #444; }
    .form-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    input, select { border: 1px solid #ccc; border-radius: 4px; padding: 0.4rem 0.6rem; font-size: 0.9rem; flex: 1; min-width: 120px; }
    button.btn { background: #1a3a5c; color: white; border: none; border-radius: 4px; padding: 0.4rem 1rem; cursor: pointer; font-size: 0.9rem; white-space: nowrap; }
    button.btn:hover { background: #24527a; }
    button.btn.danger { background: #b71c1c; }
    button.btn.success { background: #1b5e20; }
    button.btn.warn { background: #e65100; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { background: #e8edf3; text-align: left; padding: 0.5rem 0.6rem; }
    td { padding: 0.45rem 0.6rem; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
    .badge.active   { background: #c8e6c9; color: #1b5e20; }
    .badge.returned { background: #e3f2fd; color: #0d47a1; }
    .badge.inactive { background: #ffccbc; color: #bf360c; }
    .badge.pending  { background: #fff9c4; color: #f57f17; }
    .badge.ready    { background: #c8e6c9; color: #1b5e20; }
    .badge.cancelled{ background: #eeeeee; color: #616161; }
    .msg { padding: 0.5rem 0.75rem; border-radius: 4px; margin-bottom: 0.75rem; font-size: 0.875rem; }
    .msg.ok  { background: #c8e6c9; color: #1b5e20; }
    .msg.err { background: #ffcdd2; color: #b71c1c; }
    .empty { color: #999; font-style: italic; padding: 0.5rem 0; }
    label { font-size: 0.8rem; color: #555; margin-bottom: 0.15rem; display: block; }
    .field { display: flex; flex-direction: column; flex: 1; min-width: 120px; }
    /* breadcrumb */
    .breadcrumb { font-size: 0.85rem; color: #666; margin-bottom: 1rem; }
    .bc-link { color: #1a3a5c; cursor: pointer; text-decoration: underline; }
    .bc-link:hover { color: #24527a; }
    /* definition list */
    .dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.3rem 1.5rem; margin: 0.5rem 0; }
    .dl-row { display: contents; }
    .dl-label { font-size: 0.8rem; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; padding: 0.2rem 0; }
    .dl-value { font-size: 0.9rem; padding: 0.2rem 0; }
    /* action row */
    .action-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    /* clickable rows */
    tbody tr[style*="pointer"]:hover td { background: #eef3f9; }
    /* inline table links */
    a.tbl-link { color: #1a3a5c; text-decoration: underline; cursor: pointer; }
    a.tbl-link:hover { color: #24527a; }
    /* info page */
    .info-hero { background: #1a3a5c; color: white; border-radius: 8px; padding: 2rem; margin-bottom: 1.5rem; }
    .info-title { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .info-subtitle { font-size: 0.95rem; opacity: 0.8; }
    .info-section { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .info-h2 { font-size: 1.05rem; color: #1a3a5c; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #e8edf3; }
    .info-h3 { font-size: 0.9rem; color: #444; margin-bottom: 0.6rem; }
    .info-p { font-size: 0.9rem; line-height: 1.65; color: #333; margin-bottom: 0.75rem; }
    .info-p:last-child { margin-bottom: 0; }
    .info-rule { display: grid; grid-template-columns: 220px 1fr; gap: 0.5rem 1rem; padding: 0.55rem 0; border-bottom: 1px solid #f4f4f4; font-size: 0.875rem; }
    .info-rule:last-child { border-bottom: none; }
    .info-rule-label { font-weight: 600; color: #1a3a5c; }
    .info-rule-desc { color: #444; line-height: 1.5; }
    .info-tbl { width: 100%; border-collapse: collapse; font-size: 0.875rem; margin-top: 0.75rem; }
    .info-tbl th { background: #e8edf3; text-align: left; padding: 0.45rem 0.75rem; }
    .info-tbl td { padding: 0.45rem 0.75rem; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    .info-tbl tr:last-child td { border-bottom: none; }
    /* flow steps */
    .flow { display: flex; flex-direction: column; gap: 0; }
    .flow-step { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.6rem 0; position: relative; }
    .flow-step:not(:last-child)::after { content: ''; position: absolute; left: 13px; top: 38px; bottom: 0; width: 2px; background: #d0dae6; }
    .flow-num { width: 28px; height: 28px; border-radius: 50%; background: #1a3a5c; color: white; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; z-index: 1; }
    .flow-body { font-size: 0.9rem; padding-top: 4px; line-height: 1.5; }
    .flow-detail { color: #666; font-size: 0.85rem; }
    /* DataTable */
    .dt-wrap { overflow-x: auto; }
    .dt-count { font-size: 0.78rem; color: #888; margin-bottom: 0.35rem; text-align: right; }
    th.dt-sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    th.dt-sortable:hover { background: #d4dce8; }
    th.dt-sorted { background: #c3d0e3; color: #1a3a5c; }
    .dt-filter-row td { background: #f0f3f7; padding: 0.3rem 0.4rem; border-bottom: 2px solid #d0dae6; }
    .dt-filter-inp { width: 100%; min-width: 0; padding: 0.25rem 0.4rem; font-size: 0.8rem; border: 1px solid #ccc; border-radius: 3px; }
    .dt-filter-sel { width: 100%; min-width: 0; padding: 0.25rem 0.3rem; font-size: 0.8rem; border: 1px solid #ccc; border-radius: 3px; }
    .dt-empty-cell { text-align: center; color: #999; font-style: italic; padding: 1rem; }
    .badge.overdue { background: #ffcdd2; color: #b71c1c; }
  </style>
</head>
<body>
<header>
  <h1>📚 Library Management System</h1>
  <a href="/api-docs" target="_blank">Swagger API Docs ↗</a>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<script src="app.js"></script>
</body>
</html>
